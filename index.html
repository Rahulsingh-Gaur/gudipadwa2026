<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gudi Padwa 2026 - Registration</title>
  <meta http-equiv="refresh" content="2;url=https://padwa2026.vercel.app">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #7B1F3B 0%, #5A1629 100%);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .container {
      background: rgba(255,255,255,0.15);
      padding: 50px 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,215,0,0.3);
      max-width: 400px;
      width: 100%;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      color: #FFD700;
    }
    .subtitle {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 25px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,215,0,0.3);
      border-top: 5px solid #FFD700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }
    p {
      opacity: 0.9;
      margin: 10px 0;
      font-size: 1rem;
    }
    a {
      color: #FFD700;
      text-decoration: none;
      font-weight: bold;
    }
    a:hover { text-decoration: underline; }
    .footer {
      margin-top: 30px;
      font-size: 0.85rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🎉</div>
    <h1>Gudi Padwa 2026</h1>
    <p class="subtitle">Registration Portal</p>
    <p>Redirecting to secure site...</p>
    <div class="spinner"></div>
    <p class="footer">
      If not redirected,<br>
      <a href="https://padwa2026.vercel.app">Click here to continue</a>
    </p>
  </div>
</body>
</html>
